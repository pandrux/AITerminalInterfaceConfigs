# starship.toml — Prompt config
# Classic user@host:dir$ on the prompt line, contextual info above

# Two-line prompt: info line above, classic prompt below
format = """
$git_branch$git_status$nodejs$cmd_duration
$username$hostname$directory$character"""

# Show username always (not just in SSH)
[username]
show_always = true
style_user = "bold green"
format = "[$user]($style)@"

# Show hostname always
[hostname]
ssh_only = false
style = "bold green"
format = "[$hostname]($style):"

# Directory — full path, no truncation
[directory]
style = "bold blue"
format = "[$path]($style)"
truncate_to_repo = false
truncation_length = 0

# Prompt character — $ for normal, # for root
[character]
success_symbol = "[\\$](bold white)"
error_symbol = "[\\$](bold red)"

# Git branch
[git_branch]
style = "bold purple"
format = "[$symbol$branch]($style) "

# Git status — compact
[git_status]
style = "bold yellow"

# Node.js version
[nodejs]
format = "[$symbol($version)]($style) "

# Command duration — only show for long commands
[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
